name: Python Automated Tests

# Запускаємо процес при кожному push у будь-яку гілку
on: [push]

# Встановлюємо глобальну змінну середовища для примусового використання Node.js 24
# Це прибере попередження (deprecation warning) від GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Завантажуємо код з GitHub на віртуальну машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Встановлюємо Python (вказуємо версію)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Крок 3: Перевіряємо, чи правильно встановився Python (необов'язково, але корисно)
      - name: Display Python version
        run: python --version

      # Крок 4: Запускаємо наш файл із тестами
      - name: Run unit tests
        run: python -m unittest unit_test.py
